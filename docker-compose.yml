services:
  postgres:
    image: postgres:16-alpine
    container_name: truffl-postgres
    environment:
      POSTGRES_USER: truffl
      POSTGRES_PASSWORD: truffl
      POSTGRES_DB: truffl
    ports:
      - "5432:5432"
    volumes:
      - truffl-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U truffl -d truffl"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: truffl-redis
    ports:
      - "6379:6379"
    volumes:
      - truffl-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  truffl-postgres-data:
  truffl-redis-data:
